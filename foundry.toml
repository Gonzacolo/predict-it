[profile.default]
src = "contracts"
test = "contracts/test"
script = "contracts/script"
out = "contracts/out"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
arc-testnet = "https://rpc.testnet.arc.network"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
